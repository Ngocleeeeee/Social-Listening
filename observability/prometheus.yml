global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: dashboard-api
    metrics_path: /metrics
    static_configs:
      - targets: ["dashboard-api:8080"]
        labels:
          service: dashboard-api

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
