<text x="450" y="596" text-anchor="middle" font-size="12" fill="#64748b">REST · SignalR · snapshot read-model · JWT</text>

<rect x="700" y="554" width="160" height="56" rx="9" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
