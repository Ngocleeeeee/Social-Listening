<text x="765" y="372" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">Sentiment NLP</text>
<text x="765" y="390" text-anchor="middle" font-size="12" fill="#64748b">Python · RoBERTa</text>
<line x1="632" y1="368" x2="668" y2="368" stroke="#64748b" stroke-width="1.5" marker-end="url(#ar)"/>
