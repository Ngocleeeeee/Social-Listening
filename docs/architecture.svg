<text x="450" y="474" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">Elasticsearch</text>
<text x="450" y="492" text-anchor="middle" font-size="12" fill="#64748b">search + aggregations</text>
<rect x="610" y="450" width="250" height="54" rx="9" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
<text x="735" y="474" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">Kafka</text>
<text x="735" y="492" text-anchor="middle" font-size="12" fill="#64748b">analyzed-mention · alerts</text>

<!-- Dashboard row -->
<line x1="165" y1="504" x2="340" y2="548" stroke="#64748b" stroke-width="1.5" marker-end="url(#ar)"/>
<line x1="450" y1="504" x2="450" y2="548" stroke="#64748b" stroke-width="1.5" marker-end="url(#ar)"/>
<line x1="735" y1="504" x2="560" y2="548" stroke="#64748b" stroke-width="1.5" marker-end="url(#ar)"/>

<rect x="230" y="552" width="440" height="60" rx="9" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
