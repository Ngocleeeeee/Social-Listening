<rect x="300" y="652" width="300" height="54" rx="9" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
<text x="450" y="676" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">Trình duyệt · React</text>
<text x="450" y="694" text-anchor="middle" font-size="12" fill="#64748b">realtime feed · charts · alerts</text>
