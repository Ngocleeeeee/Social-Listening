<rect x="40" y="554" width="170" height="56" rx="9" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
<text x="125" y="578" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">Prometheus</text>
<text x="125" y="595" text-anchor="middle" font-size="12" fill="#64748b">+ Grafana</text>
<line x1="230" y1="582" x2="212" y2="582" stroke="#64748b" stroke-width="1.5" marker-end="url(#ar)"/>

<!-- Browser -->
<line x1="450" y1="612" x2="450" y2="648" stroke="#64748b" stroke-width="1.5" marker-end="url(#ar)"/>
