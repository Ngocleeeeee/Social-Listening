<svg width="900" viewBox="0 0 900 736" role="img" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
<title>BrandRadar architecture</title>
<desc>Data flows from real sources through Collector, RabbitMQ, Analysis.Worker, then into PostgreSQL, Elasticsearch and Kafka, and finally to Dashboard.Api and the browser.</desc>
<defs>
<marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/></marker>
</defs>

<rect x="0" y="0" width="900" height="736" rx="16" fill="#ffffff" stroke="#e2e8f0"/>

<text x="30" y="40" font-size="20" font-weight="700" fill="#0f172a">BrandRadar — System Architecture</text>

<rect x="590" y="24" width="15" height="15" rx="3" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
<text x="612" y="36" font-size="12.5" fill="#475569">Custom services (.NET / Python)</text>
<rect x="590" y="46" width="15" height="15" rx="3" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
<text x="612" y="58" font-size="12.5" fill="#475569">Infrastructure / client</text>

<!-- Sources -->
<rect x="40"  y="70" width="250" height="50" rx="9" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
<text x="165" y="100" text-anchor="middle" font-size="15" fill="#1e293b">Báo chí · RSS</text>
<rect x="325" y="70" width="250" height="50" rx="9" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
<text x="450" y="100" text-anchor="middle" font-size="15" fill="#1e293b">Google News</text>
<rect x="610" y="70" width="250" height="50" rx="9" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
<text x="735" y="100" text-anchor="middle" font-size="15" fill="#1e293b">Reddit</text>

<line x1="165" y1="120" x2="410" y2="156" stroke="#64748b" stroke-width="1.5" marker-end="url(#ar)"/>
<line x1="450" y1="120" x2="450" y2="156" stroke="#64748b" stroke-width="1.5" marker-end="url(#ar)"/>
<line x1="735" y1="120" x2="490" y2="156" stroke="#64748b" stroke-width="1.5" marker-end="url(#ar)"/>

<!-- Collector -->
<rect x="300" y="160" width="300" height="54" rx="9" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
<text x="450" y="184" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">Collector.Worker</text>
<text x="450" y="202" text-anchor="middle" font-size="12" fill="#64748b">.NET BackgroundService · poll định kỳ</text>
<line x1="450" y1="214" x2="450" y2="250" stroke="#64748b" stroke-width="1.5" marker-end="url(#ar)"/>

<!-- RabbitMQ -->
<rect x="300" y="254" width="300" height="54" rx="9" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
<text x="450" y="278" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">RabbitMQ</text>
<text x="450" y="296" text-anchor="middle" font-size="12" fill="#64748b">ingest queue + Dead-Letter</text>
<line x1="450" y1="308" x2="450" y2="344" stroke="#64748b" stroke-width="1.5" marker-end="url(#ar)"/>

