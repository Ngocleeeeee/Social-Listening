name: brandradar

services:
  postgres:
    image: postgres:16
    container_name: br-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: brandradar
      POSTGRES_USER: radar
      POSTGRES_PASSWORD: radar
    ports: ["5433:5432"]
    volumes: ["brpg:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radar -d brandradar"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: br-rabbitmq
    restart: unless-stopped
    ports: ["5673:5672", "15673:15672"]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: br-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports: ["9201:9200"]
    volumes: ["bres:/usr/share/elasticsearch/data"]
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\"'"]
      interval: 15s
      timeout: 10s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: br-ollama
    restart: unless-stopped
    profiles: ["llm"]
    ports: ["11434:11434"]
    volumes: ["brollama:/root/.ollama"]

  redis:
    image: redis:7-alpine
    container_name: br-redis
    restart: unless-stopped
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: br-kibana
    restart: unless-stopped
    depends_on:
      elasticsearch: { condition: service_healthy }
    ports: ["5602:5601"]
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: br-kafka
    restart: unless-stopped
    ports: ["9092:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: INTERNAL://kafka:29092,CONTROLLER://kafka:29093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:29092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  collector:
    build: { context: ./src, dockerfile: Collector.Worker/Dockerfile }
    container_name: br-collector
    restart: unless-stopped
    depends_on:
      rabbitmq: { condition: service_healthy }
      postgres: { condition: service_healthy }

  sentiment-nlp:
    build: { context: ./sentiment-nlp }
    container_name: br-sentiment-nlp
    restart: unless-stopped
    ports: ["8000:8000"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  analysis:
    build: { context: ./src, dockerfile: Analysis.Worker/Dockerfile }
    container_name: br-analysis
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      elasticsearch: { condition: service_healthy }
      sentiment-nlp: { condition: service_healthy }
      kafka: { condition: service_healthy }

  dashboard-api:
    build: { context: ./src, dockerfile: Dashboard.Api/Dockerfile }
    container_name: br-dashboard-api
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      elasticsearch: { condition: service_healthy }
      kafka: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      # Override secrets via .env (see .env.example); fall back to demo defaults.
      Jwt__Key: ${JWT_KEY:-brandradar-super-secret-key-change-me-please-32b}
      Auth__Username: ${ADMIN_USER:-admin}
      Auth__Password: ${ADMIN_PASSWORD:-admin123}
    ports: ["8090:8080"]

  frontend:
    build: { context: ./frontend, dockerfile: Dockerfile }
    container_name: br-frontend
    restart: unless-stopped
    depends_on: [dashboard-api]
    ports: ["3000:80"]

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: br-prometheus
    restart: unless-stopped
    depends_on: [dashboard-api]
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana:11.2.0
    container_name: br-grafana
    restart: unless-stopped
    depends_on: [prometheus]
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports: ["3001:3000"]

volumes:
  brpg:
  bres:
  brollama:
