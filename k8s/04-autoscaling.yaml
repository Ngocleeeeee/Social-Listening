# Horizontal Pod Autoscalers — scale workers/api by CPU load (needs metrics-server).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: analysis-hpa, namespace: brandradar }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: analysis }
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: dashboard-hpa, namespace: brandradar }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: dashboard-api }
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
