# Routes / -> frontend, /api & /hubs -> dashboard-api (needs an ingress controller, e.g. nginx).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: brandradar
  namespace: brandradar
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
spec:
  rules:
    - host: brandradar.local
      http:
        paths:
          - { path: /api, pathType: Prefix, backend: { service: { name: dashboard-api, port: { number: 8080 } } } }
          - { path: /hubs, pathType: Prefix, backend: { service: { name: dashboard-api, port: { number: 8080 } } } }
          - { path: /, pathType: Prefix, backend: { service: { name: frontend, port: { number: 80 } } } }
