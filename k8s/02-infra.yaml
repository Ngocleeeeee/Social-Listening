# Demo-grade infra (single replica, ephemeral). In production use managed services / operators.
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: postgres, namespace: brandradar }
spec:
  replicas: 1
  selector: { matchLabels: { app: postgres } }
  template:
    metadata: { labels: { app: postgres } }
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - { name: POSTGRES_DB, value: brandradar }
            - { name: POSTGRES_USER, value: radar }
            - { name: POSTGRES_PASSWORD, value: radar }
          ports: [{ containerPort: 5432 }]
---
apiVersion: v1
kind: Service
metadata: { name: postgres, namespace: brandradar }
spec: { selector: { app: postgres }, ports: [{ port: 5432, targetPort: 5432 }] }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: rabbitmq, namespace: brandradar }
spec:
  replicas: 1
  selector: { matchLabels: { app: rabbitmq } }
  template:
    metadata: { labels: { app: rabbitmq } }
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management
          ports: [{ containerPort: 5672 }, { containerPort: 15672 }]
---
apiVersion: v1
kind: Service
metadata: { name: rabbitmq, namespace: brandradar }
spec: { selector: { app: rabbitmq }, ports: [{ name: amqp, port: 5672 }, { name: mgmt, port: 15672 }] }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: kafka, namespace: brandradar }
spec:
  replicas: 1
  selector: { matchLabels: { app: kafka } }
  template:
    metadata: { labels: { app: kafka } }
    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.6.1
          env:
            - { name: KAFKA_NODE_ID, value: "1" }
            - { name: KAFKA_PROCESS_ROLES, value: "broker,controller" }
            - { name: KAFKA_CONTROLLER_QUORUM_VOTERS, value: "1@kafka:29093" }
            - { name: KAFKA_LISTENERS, value: "INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093" }
            - { name: KAFKA_ADVERTISED_LISTENERS, value: "INTERNAL://kafka:29092" }
            - { name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP, value: "INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT" }
            - { name: KAFKA_INTER_BROKER_LISTENER_NAME, value: "INTERNAL" }
            - { name: KAFKA_CONTROLLER_LISTENER_NAMES, value: "CONTROLLER" }
            - { name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR, value: "1" }
            - { name: KAFKA_AUTO_CREATE_TOPICS_ENABLE, value: "true" }
            - { name: CLUSTER_ID, value: "MkU3OEVBNTcwNTJENDM2Qk" }
          ports: [{ containerPort: 29092 }]
---
apiVersion: v1
kind: Service
metadata: { name: kafka, namespace: brandradar }
spec: { selector: { app: kafka }, ports: [{ name: internal, port: 29092, targetPort: 29092 }] }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: elasticsearch, namespace: brandradar }
spec:
  replicas: 1
  selector: { matchLabels: { app: elasticsearch } }
  template:
    metadata: { labels: { app: elasticsearch } }
    spec:
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
          env:
            - { name: discovery.type, value: single-node }
            - { name: xpack.security.enabled, value: "false" }
            - { name: ES_JAVA_OPTS, value: "-Xms512m -Xmx512m" }
          ports: [{ containerPort: 9200 }]
---
apiVersion: v1
kind: Service
metadata: { name: elasticsearch, namespace: brandradar }
spec: { selector: { app: elasticsearch }, ports: [{ port: 9200, targetPort: 9200 }] }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: redis, namespace: brandradar }
spec:
  replicas: 1
  selector: { matchLabels: { app: redis } }
  template:
    metadata: { labels: { app: redis } }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports: [{ containerPort: 6379 }]
---
apiVersion: v1
kind: Service
metadata: { name: redis, namespace: brandradar }
spec: { selector: { app: redis }, ports: [{ port: 6379, targetPort: 6379 }] }
